<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saad | Computer Science & Engineering</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-main: #ffffff;
            --accent-white: #f0f0f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000; /* Fallback */
        }

        /* Video Background */
        #bg-video {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            transform: translate(-50%, -50%);
            z-index: -1;
            object-fit: cover;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%);
            z-index: 0;
        }

        /* Profile Card - Sleek White Minimalist */
        .profile-card {
            position: relative;
            z-index: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(18px) saturate(180%);
            -webkit-backdrop-filter: blur(18px) saturate(180%);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 420px;
            margin: 20px;
            animation: slideUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            transition: transform 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Profile Picture */
        .profile-pic {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin: 0 auto 25px;
            padding: 4px;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.2) 100%);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .profile-pic img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
        }

        /* Typography */
        .profile-name {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .profile-title {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .profile-bio {
            font-size: 15px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 30px;
            font-style: italic;
            font-weight: 300;
        }

        /* Social Icons */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .social-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
        }

        .social-icon:hover {
            background: #ffffff;
            transform: translateY(-8px) scale(1.1);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.2);
        }

        .social-icon svg {
            width: 22px;
            height: 22px;
            fill: white;
            transition: fill 0.3s ease;
        }

        .social-icon:hover svg {
            fill: #000;
        }

        /* Volume Control Overlay */
        .volume-control {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 5;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .volume-slider {
            width: 80px;
            cursor: pointer;
            accent-color: #fff;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .profile-card {
                padding: 40px 25px;
            }
            .profile-name { font-size: 26px; }
        }
    </style>
</head>

    <div class="volume-control">
        <span style="color: white; font-size: 12px;">🔊</span>
        <input type="range" min="0" max="100" value="50" class="volume-slider" id="volume-slider">
    </div>

    <script>
        const bgVideo = document.getElementById('bg-video');
        const volumeSlider = document.getElementById('volume-slider');
        const card = document.querySelector('.profile-card');

        // Video Audio Handling
        bgVideo.volume = 0.5;
        volumeSlider.addEventListener('input', (e) => {
            bgVideo.volume = e.target.value / 100;
        });

        // Add a subtle 3D tilt effect on mouse move
        document.addEventListener('mousemove', (e) => {
            let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Reset card on mouse leave
        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        // Handle video playback (browsers often block auto-play with sound)
        document.body.addEventListener('click', () => {
            bgVideo.play();
        }, { once: true });
    </script>
